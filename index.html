<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt Master - Practice 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e0f2fe; /* Xanh nước biển nhạt */
            overflow-x: hidden;
        }
        .pink-accent { color: #f472b6; }
        .bg-pink-accent { background-color: #f472b6; }
        .card-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .island-node {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .island-node:hover { transform: scale(1.1); }
        .island-active { filter: drop-shadow(0 0 10px #f472b6); border: 4px solid #f472b6; }
        .island-locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .explorer-anim { animation: float 3s ease-in-out infinite; }
        
        .progress-bar {
            height: 12px;
            border-radius: 6px;
            background: #cbd5e1;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #ec4899);
            transition: width 0.5s ease-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800">

<div id="app" class="min-h-screen flex flex-col">
    <!-- Header / Progress Section -->
    <header class="bg-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🧭</div>
                <div class="flex-1 min-w-[150px]">
                    <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">Tiến trình</div>
                    <div class="progress-bar mt-1">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-blue-100 px-3 py-1 rounded-full border border-blue-200">
                    <span class="text-blue-600 font-bold">💎 <span id="scoreDisplay">0</span></span>
                </div>
                <div class="font-bold text-pink-500" id="stageName">Map Overview</div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full p-4 relative">
        
        <!-- START SCREEN: MAP OVERVIEW -->
        <div id="mapScreen" class="py-8">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-blue-600 mb-2">TREASURE HUNT MASTER</h1>
                <p class="text-slate-500 italic">Practice Test 4 Edition</p>
            </div>

            <div class="relative bg-white rounded-3xl p-8 card-shadow overflow-hidden min-h-[400px] flex flex-col items-center justify-center border-4 border-blue-100">
                <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: radial-gradient(#3b82f6 1px, transparent 1px); background-size: 20px 20px;"></div>
                
                <div class="grid grid-cols-1 md:grid-cols-5 gap-6 w-full z-10">
                    <!-- Island 1 -->
                    <div onclick="startStage(0)" id="island0" class="island-node bg-blue-50 p-4 rounded-2xl text-center border-2 border-dashed border-blue-300">
                        <div class="text-4xl mb-2">🏝️</div>
                        <div class="font-bold text-sm">PHONETIC</div>
                    </div>
                    <!-- Island 2 -->
                    <div onclick="startStage(1)" id="island1" class="island-node island-locked bg-blue-50 p-4 rounded-2xl text-center border-2 border-dashed border-blue-300">
                        <div class="text-4xl mb-2">🌴</div>
                        <div class="font-bold text-sm text-wrap">GRAMMAR & VOCAB</div>
                    </div>
                    <!-- Island 3 -->
                    <div onclick="startStage(2)" id="island2" class="island-node island-locked bg-blue-50 p-4 rounded-2xl text-center border-2 border-dashed border-blue-300">
                        <div class="text-4xl mb-2">🏜️</div>
                        <div class="font-bold text-sm">READING</div>
                    </div>
                    <!-- Island 4 -->
                    <div onclick="startStage(3)" id="island3" class="island-node island-locked bg-blue-50 p-4 rounded-2xl text-center border-2 border-dashed border-blue-300">
                        <div class="text-4xl mb-2">🏔️</div>
                        <div class="font-bold text-sm">WRITING</div>
                    </div>
                    <!-- Island 5 -->
                    <div onclick="startStage(4)" id="island4" class="island-node island-locked bg-blue-50 p-4 rounded-2xl text-center border-2 border-dashed border-blue-300">
                        <div class="text-4xl mb-2">🌊</div>
                        <div class="font-bold text-sm">LISTENING</div>
                    </div>
                </div>

                <div class="mt-12 explorer-anim text-center">
                    <div class="text-6xl mb-2">👦</div>
                    <div class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">
                        Explorer: "Sẵn sàng tìm kho báu chưa?"
                    </div>
                </div>
                
                <button onclick="startStage(currentStageIndex)" id="btnMainAction" class="mt-8 bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-xl transition-all">
                    BẮT ĐẦU NGAY! 🚀
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="hidden py-4">
            <div id="questionContainer" class="bg-white rounded-3xl p-6 md:p-8 card-shadow border-4 border-white">
                <!-- Question content injected here -->
            </div>
            
            <div id="feedbackContainer" class="hidden mt-6 bg-white rounded-3xl p-6 card-shadow border-4 border-blue-200">
                <!-- Explanations injected here -->
            </div>

            <div id="navigation" class="hidden mt-6 flex justify-between items-center">
                <button id="btnNext" onclick="nextQuestion()" class="ml-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center gap-2">
                    Tiếp tục <span class="text-xl">➔</span>
                </button>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="endScreen" class="hidden py-8 text-center">
            <div class="bg-white rounded-3xl p-12 card-shadow border-4 border-yellow-400">
                <div class="text-8xl mb-6">🏆</div>
                <h2 class="text-4xl font-bold text-blue-600 mb-4">YOU FOUND THE TREASURE!</h2>
                <div class="text-6xl font-bold text-pink-500 mb-4" id="finalScoreText">0/52</div>
                <div class="text-2xl font-semibold mb-8" id="rankText">Excellent! 🌟</div>
                
                <div class="max-w-xs mx-auto">
                    <div class="bg-slate-100 p-4 rounded-xl mb-6">
                        <h3 class="font-bold mb-2">Leaderboard (Local)</h3>
                        <div id="leaderboardList" class="text-sm space-y-1">
                            <!-- Leaderboard logic -->
                        </div>
                    </div>
                </div>

                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full text-xl shadow-xl transition-all">
                    CHƠI LẠI 🔄
                </button>
            </div>
        </div>
    </main>

    <!-- UI Audio Elements (Placeholders) -->
    <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
</div>

<script>
/* DATA STRUCTURE FOR PRACTICE TEST 4 */
const stages = [
    { name: "🏝️ PHONETIC", icon: "🏝️" },
    { name: "🌴 GRAMMAR & VOCAB", icon: "🌴" },
    { name: "🏜️ READING", icon: "🏜️" },
    { name: "🏔️ WRITING", icon: "🏔️" },
    { name: "🌊 LISTENING", icon: "🌊" }
];

const questions = [
    // PHONETIC (1-5)
    {
        stage: 0,
        type: "mcq",
        q: "Choose the word whose underlined part differs in pronunciation: <u>th</u>ealthy, ma<u>th</u>ematics, al<u>th</u>ough, <u>th</u>ought",
        options: ["healthy", "mathematics", "although", "thought"],
        correct: 2,
        explanation: {
            correct: "C. although",
            translation: { en: "The underlined part in 'although' is pronounced /ð/, while others are /θ/.", vi: "Phần gạch chân trong 'although' phát âm là /ð/, các từ còn lại phát âm là /θ/." },
            vocab: [
                { word: "healthy", pr: "/ˈhelθi/", en: "in good health", vi: "khỏe mạnh", type: "adj", ex: "She is healthy because she exercises." },
                { word: "mathematics", pr: "/ˌmæθəˈmætɪks/", en: "the study of numbers", vi: "toán học", type: "noun", ex: "I love mathematics." },
                { word: "although", pr: "/ɔːlˈðəʊ/", en: "despite the fact that", vi: "mặc dù", type: "conj", ex: "Although it rained, we went out." },
                { word: "thought", pr: "/θɔːt/", en: "past tense of think", vi: "suy nghĩ", type: "verb", ex: "I thought you were busy." }
            ],
            analysis: "Âm /θ/ (vô thanh) vs /ð/ (hữu thanh). 'Although' là từ chức năng nên thường đọc là /ð/.",
            wrong: "A, B, D đều có âm /θ/.",
            tip: "Các từ nối/đại từ như 'this, that, though' thường đọc là /ð/."
        }
    },
    {
        stage: 0,
        type: "mcq",
        q: "Choose the word whose underlined part differs: bak<u>e</u>ry, pock<u>e</u>t, newsag<u>e</u>nt, lant<u>e</u>rn",
        options: ["bakery", "pocket", "newsagent", "lantern"],
        correct: 2,
        explanation: {
            correct: "C. newsagent",
            translation: { en: "The 'e' in 'newsagent' is pronounced /ə/ or /eɪ/, others are /ɪ/ or /ə/ depending on dialect, but 'agent' is distinct.", vi: "Chữ 'e' trong 'newsagent' (âm /ə/) khác biệt so với âm /ɪ/ trong các từ còn lại." },
            vocab: [
                { word: "bakery", pr: "/ˈbeɪkəri/", en: "place for bread", vi: "tiệm bánh", type: "noun", ex: "Go to the bakery." },
                { word: "pocket", pr: "/ˈpɒkɪt/", en: "small pouch in clothes", vi: "túi áo/quần", type: "noun", ex: "He has a coin in his pocket." },
                { word: "newsagent", pr: "/ˈnjuːzeɪdʒənt/", en: "person selling papers", vi: "người bán báo", type: "noun", ex: "Buy a paper at the newsagent." },
                { word: "lantern", pr: "/ˈlæntən/", en: "portable lamp", vi: "đèn lồng", type: "noun", ex: "We carry a lantern." }
            ],
            analysis: "Phân tích âm tiết không nhấn trọng âm. 'Pocket' âm /ɪ/, 'newsagent' âm /ə/.",
            wrong: "A, B, D có cách phát âm e tương tự nhau ở vị trí không trọng âm.",
            tip: "Đuôi 'et' trong 'pocket' thường đọc là /ɪt/."
        }
    },
    {
        stage: 0,
        type: "mcq",
        q: "Choose the word whose underlined part differs: mark<u>ed</u>, observ<u>ed</u>, prepar<u>ed</u>, turn<u>ed</u>",
        options: ["marked", "observed", "prepared", "turned"],
        correct: 0,
        explanation: {
            correct: "A. marked",
            translation: { en: "'Marked' ends in /t/ because it follows a voiceless sound /k/.", vi: "'Marked' kết thúc bằng âm /t/ vì sau âm vô thanh /k/." },
            vocab: [
                { word: "marked", pr: "/mɑːkt/", en: "having a mark", vi: "được đánh dấu", type: "verb-ed", ex: "He marked the book." },
                { word: "observed", pr: "/əbˈzɜːvd/", en: "watched carefully", vi: "quan sát", type: "verb-ed", ex: "She observed the stars." },
                { word: "prepared", pr: "/prɪˈpeəd/", en: "ready", vi: "chuẩn bị", type: "verb-ed", ex: "We prepared lunch." },
                { word: "turned", pr: "/tɜːnd/", en: "changed direction", vi: "quay lại", type: "verb-ed", ex: "He turned the page." }
            ],
            analysis: "Quy tắc phát âm -ed: sau /k/ phát âm là /t/. Sau các phụ âm hữu thanh còn lại phát âm là /d/.",
            wrong: "B, C, D đều phát âm là /d/.",
            tip: "Sáng sớm pha trà cho (s, p, k, t, ch, f) -> phát âm là /t/."
        }
    },
    {
        stage: 0,
        type: "mcq",
        q: "Choose the word that differs in the position of primary stress:",
        options: ["compete", "dissect", "physics", "because"],
        correct: 2,
        explanation: {
            correct: "C. physics",
            translation: { en: "'Physics' has stress on the 1st syllable, others on the 2nd.", vi: "'Physics' nhấn âm 1, các từ còn lại nhấn âm 2." },
            vocab: [
                { word: "compete", pr: "/kəmˈpiːt/", en: "take part in a contest", vi: "thi đấu", type: "verb", ex: "They compete for the prize." },
                { word: "dissect", pr: "/daɪˈsekt/", en: "cut up for study", vi: "mổ xẻ/phân tích", type: "verb", ex: "Dissect the frog." },
                { word: "physics", pr: "/ˈfɪzɪks/", en: "study of matter/energy", vi: "vật lý", type: "noun", ex: "Physics is hard." },
                { word: "because", pr: "/bɪˈkɒz/", en: "for the reason that", vi: "bởi vì", type: "conj", ex: "Because it's hot." }
            ],
            analysis: "Động từ 2 âm tiết thường nhấn âm 2. Danh từ 'physics' nhấn âm 1.",
            wrong: "A, B, D nhấn âm 2.",
            tip: "Hầu hết danh từ 2 âm tiết nhấn âm 1."
        }
    },
    {
        stage: 0,
        type: "mcq",
        q: "Choose the word that differs in the position of primary stress:",
        options: ["assistant", "greengrocer", "pharmacy", "heritage"],
        correct: 0,
        explanation: {
            correct: "A. assistant",
            translation: { en: "'Assistant' has stress on the 2nd syllable, others on the 1st.", vi: "'Assistant' nhấn âm 2, các từ còn lại nhấn âm 1." },
            vocab: [
                { word: "assistant", pr: "/əˈsɪstənt/", en: "person who helps", vi: "trợ lý", type: "noun", ex: "The shop assistant is kind." },
                { word: "greengrocer", pr: "/ˈɡriːnɡrəʊsə(r)/", en: "person selling veggies", vi: "người bán rau", type: "noun", ex: "Go to the greengrocer." },
                { word: "pharmacy", pr: "/ˈfɑːməsi/", en: "place for medicine", vi: "tiệm thuốc", type: "noun", ex: "The pharmacy is open." },
                { word: "heritage", pr: "/ˈherɪtɪdʒ/", en: "valued traditions", vi: "di sản", type: "noun", ex: "Vietnam has rich heritage." }
            ],
            analysis: "Assistant (âm 2). Greengrocer, Pharmacy, Heritage (âm 1).",
            wrong: "B, C, D đều nhấn âm 1.",
            tip: "Từ có đuôi -ant thường không đổi trọng âm của từ gốc (assist -> assistant)."
        }
    },

    // GRAMMAR (6-22)
    {
        stage: 1,
        type: "mcq",
        q: "There ________ a MRT station here, but it has disappeared.",
        options: ["were", "used to have", "use to have", "used to be"],
        correct: 3,
        explanation: {
            correct: "D. used to be",
            translation: { en: "We use 'used to be' to describe a past state that no longer exists.", vi: "Chúng ta dùng 'used to be' để mô tả một trạng thái trong quá khứ không còn tồn tại." },
            vocab: [
                { word: "used to", pr: "/juːst tu/", en: "past habit/state", vi: "đã từng", type: "modal", ex: "I used to swim." },
                { word: "disappeared", pr: "/ˌdɪsəˈpɪəd/", en: "vanished", vi: "biến mất", type: "verb", ex: "The cat disappeared." }
            ],
            analysis: "Cấu trúc: There used to be + N (Đã từng có...). Không dùng 'used to have' vì 'there' đi với 'be'.",
            wrong: "A sai thì. B, C sai cấu trúc ngữ pháp với 'there'.",
            tip: "There is/are -> There used to be."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "________ does it take to go from Ha Noi to Pleiku by plane?",
        options: ["How much", "How many", "How long", "How far"],
        correct: 2,
        explanation: {
            correct: "C. How long",
            translation: { en: "'How long' is used to ask about the duration of time.", vi: "'How long' dùng để hỏi về khoảng thời gian." },
            vocab: [
                { word: "take", pr: "/teɪk/", en: "require time", vi: "tốn (thời gian)", type: "verb", ex: "It takes 2 hours." }
            ],
            analysis: "Cấu trúc: How long + does it take + (someone) + to do something?",
            wrong: "A, B hỏi số lượng. D hỏi khoảng cách (distance).",
            tip: "Thấy 'take' + 'time' -> nghĩ ngay 'How long'."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "You should ________ right and left when you go across the road.",
        options: ["see", "look", "be", "take"],
        correct: 1,
        explanation: {
            correct: "B. look",
            translation: { en: "You should look both ways for safety.", vi: "Bạn nên quan sát (nhìn) trái phải khi băng qua đường." },
            vocab: [
                { word: "look", pr: "/lʊk/", en: "direct eyes", vi: "nhìn", type: "verb", ex: "Look at me." }
            ],
            analysis: "Collocation: look right and left (nhìn trái nhìn phải).",
            wrong: "A (see) là thấy tự nhiên. C, D không hợp nghĩa.",
            tip: "Look + direction (left/right)."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "Hurry up or we can’t ________ the last bus home.",
        options: ["keep", "follow", "go", "catch"],
        correct: 3,
        explanation: {
            correct: "D. catch",
            translation: { en: "'Catch the bus' is the standard phrase for getting on a bus.", vi: "'Catch the bus' là cụm từ chuẩn để chỉ việc bắt xe buýt." },
            vocab: [
                { word: "catch", pr: "/kætʃ/", en: "get on a vehicle", vi: "bắt (xe)", type: "verb", ex: "Catch the train." }
            ],
            analysis: "Cụm từ đi kèm: catch a bus/train/taxi.",
            wrong: "A (giữ), B (theo), C (đi) không tạo thành cụm từ đúng với phương tiện.",
            tip: "Catch the bus = Bắt xe buýt."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "When stuck ________ traffic, everyone dreams of having a flying car.",
        options: ["in", "on", "by", "off"],
        correct: 0,
        explanation: {
            correct: "A. in",
            translation: { en: "The phrase is 'stuck in traffic'.", vi: "Cụm từ cố định là 'stuck in traffic' (kẹt xe)." },
            vocab: [
                { word: "stuck", pr: "/stʌk/", en: "unable to move", vi: "bị kẹt", type: "adj", ex: "I'm stuck in the elevator." }
            ],
            analysis: "Giới từ đi với stuck: stuck in something.",
            wrong: "B, C, D không đi với 'stuck' trong ngữ cảnh này.",
            tip: "Cứ kẹt xe là 'stuck in traffic'."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "People put pumpkin ________ outside the homes during Halloween.",
        options: ["lights", "lanterns", "neon signs", "bulbs"],
        correct: 1,
        explanation: {
            correct: "B. lanterns",
            translation: { en: "Pumpkin lanterns (Jack-o'-lanterns) are traditional for Halloween.", vi: "Đèn lồng bí ngô là truyền thống của lễ Halloween." },
            vocab: [
                { word: "lantern", pr: "/ˈlæntən/", en: "portable lamp", vi: "đèn lồng", type: "noun", ex: "Halloween lanterns." }
            ],
            analysis: "Văn hóa: Halloween -> Pumpkin lanterns.",
            wrong: "A (đèn chung), C (biển quảng cáo), D (bóng đèn tròn) không đúng văn hóa.",
            tip: "Halloween + Pumpkin = Lantern."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "The festival ________ annually at the end of August.",
        options: ["occurs", "holds", "takes place", "are held"],
        correct: 2,
        explanation: {
            correct: "C. takes place",
            translation: { en: "'Takes place' means to happen.", vi: "'Takes place' có nghĩa là diễn ra." },
            vocab: [
                { word: "take place", pr: "/teɪk pleɪs/", en: "to happen", vi: "diễn ra", type: "phrasal verb", ex: "The meeting takes place at 9." }
            ],
            analysis: "Chủ ngữ số ít 'The festival' + V(s/es). 'Takes place' dùng cho sự kiện đã được lên lịch.",
            wrong: "A (xảy ra bất ngờ). B (thiếu bị động). D (sai hòa hợp số ít/nhiều).",
            tip: "Sự kiện được lên lịch -> dùng 'takes place'."
        }
    },
    {
        stage: 1,
        type: "mcq",
        q: "She is hard working, ________ she isn’t lucky in examinations.",
        options: ["Therefore", "But", "However", "So"],
        correct: 1,
        explanation: {
            correct: "B. But",
            translation: { en: "'But' connects two contrasting ideas.", vi: "'But' dùng để nối hai ý tương phản." },
            vocab: [

// Combine all questions
const allQuestions = [...questions, ...moreQuestions];

/* GAME LOGIC */
let currentStageIndex = 0;
let currentQuestionIndexInStage = 0;
let stageQuestions = [];
let score = 0;
let userAnswers = [];

const app = {
    progressFill: document.getElementById('progressFill'),
    scoreDisplay: document.getElementById('scoreDisplay'),
    stageName: document.getElementById('stageName'),
    screens: {
        map: document.getElementById('mapScreen'),
        game: document.getElementById('gameScreen'),
        end: document.getElementById('endScreen')
    }
};

function startStage(index) {
    if (index > currentStageIndex) return; // Locked

    currentStageIndex = index;
    stageQuestions = allQuestions.filter(q => q.stage === index);
    currentQuestionIndexInStage = 0;
    
    app.stageName.innerText = stages[index].name;
    showScreen('game');
    renderQuestion();
}

function renderQuestion() {
    const qData = stageQuestions[currentQuestionIndexInStage];
    const container = document.getElementById('questionContainer');
    const feedback = document.getElementById('feedbackContainer');
    const nav = document.getElementById('navigation');
    
    feedback.classList.add('hidden');
    nav.classList.add('hidden');
    
    let html = `
        <div class="mb-4 flex items-center justify-between">
            <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-sm font-bold">Câu ${currentQuestionIndexInStage + 1}/${stageQuestions.length}</span>
            <span class="text-slate-400 text-xs">Stage: ${stages[currentStageIndex].name}</span>
        </div>
        <h2 class="text-xl md:text-2xl font-bold mb-6">${qData.q}</h2>
    `;

    if (qData.type.startsWith('reading')) {
        html = `
            <div class="mb-4 p-4 bg-yellow-50 border-l-4 border-yellow-400 text-sm mb-6 max-h-60 overflow-y-auto">
                <p class="italic text-slate-700">${qData.passage}</p>
            </div>
            ${html}
        `;
    }

    html += `<div class="grid grid-cols-1 gap-3">`;
    qData.options.forEach((opt, idx) => {
        html += `
            <button onclick="checkAnswer(${idx})" class="option-btn text-left p-4 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition-all font-medium flex items-center gap-3">
                <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-sm font-bold">${String.fromCharCode(65 + idx)}</span>
                ${opt}
            </button>
        `;
    });
    html += `</div>`;

    container.innerHTML = html;
}

function checkAnswer(idx) {
    const qData = stageQuestions[currentQuestionIndexInStage];
    const buttons = document.querySelectorAll('.option-btn');
    const feedback = document.getElementById('feedbackContainer');
    const nav = document.getElementById('navigation');
    
    // Disable buttons
    buttons.forEach(btn => btn.disabled = true);

    const isCorrect = (idx === qData.correct);
    if (isCorrect) {
        score += 10;
        app.scoreDisplay.innerText = score;
        buttons[idx].classList.add('bg-green-100', 'border-green-500', 'text-green-700');
        document.getElementById('soundCorrect').play();
    } else {
        buttons[idx].classList.add('bg-red-100', 'border-red-500', 'text-red-700');
        buttons[qData.correct].classList.add('bg-green-100', 'border-green-500', 'text-green-700');
        document.getElementById('soundWrong').play();
    }

    // Show Explanation
    feedback.innerHTML = formatExplanation(qData.explanation);
    feedback.classList.remove('hidden');
    nav.classList.remove('hidden');
    
    // Update progress
    updateProgress();
}

function formatExplanation(exp) {
    let vocabHtml = exp.vocab.map(v => `
        <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
            <div class="font-bold text-blue-600">${v.word} <span class="text-xs text-slate-500 font-normal">${v.pr}</span></div>
            <div class="text-xs mb-1"><span class="italic text-pink-500">${v.type}</span> | ${v.en}</div>
            <div class="text-sm font-semibold">${v.vi}</div>
            <div class="text-xs text-slate-500 mt-1 italic">Ex: ${v.ex}</div>
        </div>
    `).join('');

    return `
        <div class="space-y-4">
            <div class="flex items-center gap-2 text-green-600 font-bold text-lg">
                ✅ 1. ĐÁP ÁN ĐÚNG: ${exp.correct}
            </div>
            
            <div class="border-t pt-3">
                <div class="font-bold text-blue-500 mb-1">🌍 2. DỊCH NGHĨA SONG NGỮ</div>
                <div class="text-sm">🇬🇧 ${exp.translation.en}</div>
                <div class="text-sm font-semibold text-slate-700 mt-1">🇻🇳 ${exp.translation.vi}</div>
            </div>

            <div class="border-t pt-3">
                <div class="font-bold text-blue-500 mb-2">📚 3. PHÂN TÍCH TỪ VỰNG</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                    ${vocabHtml}
                </div>
            </div>

            <div class="border-t pt-3">
                <div class="font-bold text-blue-500 mb-1">🔍 4. GIẢI THÍCH CHI TIẾT</div>
                <p class="text-sm text-slate-700">${exp.analysis}</p>
            </div>

            <div class="border-t pt-3">
                <div class="font-bold text-blue-500 mb-1">⚠️ 5. TẠI SAO CÁC ĐÁP ÁN KHÁC SAI</div>
                <p class="text-sm text-slate-600 italic">${exp.wrong}</p>
            </div>

            <div class="bg-pink-50 p-3 rounded-xl border border-pink-100">
                <div class="font-bold text-pink-600 mb-1">🧠 6. MẸO GHI NHỚ (Memory Tips)</div>
                <p class="text-sm text-pink-700 font-medium">${exp.tip}</p>
            </div>
        </div>
    `;
}

function nextQuestion() {
    currentQuestionIndexInStage++;
    
    if (currentQuestionIndexInStage < stageQuestions.length) {
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        // Stage completed
        if (currentStageIndex < stages.length - 1) {
            currentStageIndex++;
            unlockIsland(currentStageIndex);
            showScreen('map');
            updateMapMessage();
        } else {
            showEndScreen();
        }
    }
}

function unlockIsland(idx) {
    const island = document.getElementById(`island${idx}`);
    island.classList.remove('island-locked');
    island.classList.add('island-active');
}

function updateMapMessage() {
    const explorer = document.querySelector('.explorer-anim .bg-blue-600');
    explorer.innerText = `Explorer: "Tuyệt vời! Chặng ${currentStageIndex} đã mở khóa!"`;
}

function updateProgress() {
    const totalQ = allQuestions.length;
    // Rough calculation of completed questions
    const completed = allQuestions.indexOf(stageQuestions[currentQuestionIndexInStage]) + 1;
    const percent = (completed / totalQ) * 100;
    app.progressFill.style.width = `${percent}%`;
}

function showScreen(screenId) {
    Object.values(app.screens).forEach(s => s.classList.add('hidden'));
    app.screens[screenId].classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showEndScreen() {
    showScreen('end');
    const finalScore = score / 10;
    document.getElementById('finalScoreText').innerText = `${finalScore}/${allQuestions.length}`;
    
    let rank = "Excellent 🌟";
    if (finalScore < 30) rank = "Try again 💪";
    else if (finalScore < 45) rank = "Good 👍";
    
    document.getElementById('rankText').innerText = rank;
}

// Initial state
window.onload = () => {
    // Stage 0 is already unlocked by default in CSS/HTML but let's be explicit
    unlockIsland(0);
};

</script>
